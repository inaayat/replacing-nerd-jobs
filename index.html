<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inaayat's Projects</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 64px 32px 32px;
      max-width: 860px;
      margin: 0 auto;
      width: 100%;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    header p {
      margin-top: 10px;
      font-size: 1rem;
      color: #8b949e;
      max-width: 480px;
      line-height: 1.6;
    }

    main {
      flex: 1;
      max-width: 860px;
      margin: 0 auto;
      padding: 8px 32px 64px;
      width: 100%;
    }

    .section-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #8b949e;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid #21262d;
    }

    .projects {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
      margin-bottom: 48px;
    }

    .card {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 10px;
      padding: 24px;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: border-color 0.15s, background 0.15s;
    }

    .card:hover {
      border-color: #58a6ff;
      background: #1c2128;
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .card h2 {
      font-size: 1rem;
      font-weight: 600;
      color: #58a6ff;
    }

    .card p {
      font-size: 0.875rem;
      color: #8b949e;
      line-height: 1.5;
      flex: 1;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 4px;
    }

    .tag {
      font-size: 0.7rem;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 20px;
      background: #21262d;
      color: #8b949e;
    }

    .arrow {
      color: #8b949e;
      font-size: 1rem;
      flex-shrink: 0;
      margin-top: 2px;
    }

    footer {
      text-align: center;
      padding: 24px;
      font-size: 0.8rem;
      color: #484f58;
      border-top: 1px solid #21262d;
    }
  </style>
</head>
<body>

<header>
  <h1>Inaayat's Projects</h1>
  <p>A collection of data tools, dashboards, and experiments.</p>
</header>

<main>
  <div class="section-label">Projects</div>
  <div class="projects" id="projects">

    <a class="card" href="/seattle-budget">
      <div class="card-top">
        <h2>Seattle Open Budget</h2>
        <span class="arrow">→</span>
      </div>
      <p>Interactive dashboard showing approved operating budget spend per program, 2018–2026.</p>
      <div class="tags">
        <span class="tag">Data</span>
        <span class="tag">Government</span>
        <span class="tag">Visualization</span>
      </div>
    </a>

    <!-- Add new project cards above this line -->

  </div>
</main>

<footer>if you can't beat em join em</footer>

</body>
</html>
