function svcConfig(name) {
  return SERVICES.find(s => s.name === name) || { color:"#ddd", dot:"#999" };
}

function fmt(n) {
  if (n >= 1e9) return "$" + (n/1e9).toFixed(2) + "B";
  if (n >= 1e6) return "$" + (n/1e6).toFixed(1) + "M";
  if (n >= 1e3) return "$" + (n/1e3).toFixed(0) + "K";
  return "$" + n.toLocaleString();
}
function fmtFull(n) { return "$" + Math.round(n).toLocaleString(); }

const YEARS = ["all","2026","2025","2024","2023","2022","2021","2020","2019","2018"];
const PAGE_SIZE = 25;
let activeYear = "2026";
let sortCol = "amount", sortDir = -1, currentPage = 0;
let filtered = [];
let chart = null;

// ── YEAR TABS ──
(function buildYearTabs() {
  const wrap = document.getElementById("yearTabs");
  YEARS.forEach(y => {
    const btn = document.createElement("button");
    btn.className = "year-tab" + (y === activeYear ? " active" : "");
    btn.textContent = y === "all" ? "all years" : y;
    btn.addEventListener("click", () => {
      activeYear = y;
      wrap.querySelectorAll(".year-tab").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      applyFilters();
    });
    wrap.appendChild(btn);
  });
})();

// ── AGGREGATE ──
function getFiltered() {
  const service = document.getElementById("serviceFilter").value;
  const search  = document.getElementById("searchBox").value.toLowerCase().trim();

  if (activeYear === "all") {
    const agg = {};
    for (const r of RAW_DATA) {
      if (service !== "all" && r.service !== service) continue;
      if (search && !r.program.toLowerCase().includes(search)) continue;
      const key = r.program + "|||" + r.service;
      if (!agg[key]) agg[key] = { year:"All", program:r.program, service:r.service, amount:0 };
      agg[key].amount += r.amount;
    }
    return Object.values(agg);
  }
  return RAW_DATA.filter(r => {
    if (r.year !== parseInt(activeYear)) return false;
    if (service !== "all" && r.service !== service) return false;
    if (search && !r.program.toLowerCase().includes(search)) return false;
    return true;
  });
}

function applyFilters() {
  filtered = getFiltered();
  filtered.sort((a,b) => {
    let av = a[sortCol], bv = b[sortCol];
    if (typeof av === "string") av = av.toLowerCase();
    if (typeof bv === "string") bv = bv.toLowerCase();
    return av < bv ? sortDir : av > bv ? -sortDir : 0;
  });
  currentPage = 0;
  renderDogCards();
  renderChart();
  renderTable();
}

// ── DOG CARDS ──
function renderDogCards() {
  const grid = document.getElementById("dogGrid");
  grid.innerHTML = "";

  SERVICES.forEach(svc => {
    let total = 0, count = 0;
    const yr = activeYear === "all" ? null : parseInt(activeYear);
    for (const r of RAW_DATA) {
      if (r.service !== svc.name) continue;
      if (yr !== null && r.year !== yr) continue;
      total += r.amount;
      count++;
    }

    const card = document.createElement("div");
    card.className = "dog-card";
    card.style.background = svc.color;
    card.innerHTML = `
      <img src="${svc.dog}" alt="${svc.name}">
      <div class="dog-service">${svc.name}</div>
      <div class="dog-total">${fmt(total)}</div>
      <div class="dog-count">${count} program${count!==1?"s":""}</div>
    `;
    grid.appendChild(card);
  });
}

// ── CHART ──
function renderChart() {
  const topN = parseInt(document.getElementById("topN").value);
  const byAmt = [...filtered].sort((a,b) => b.amount - a.amount).slice(0, topN);

  const labels  = byAmt.map(r => r.program.length > 30 ? r.program.slice(0,28)+"…" : r.program);
  const values  = byAmt.map(r => r.amount);
  const colors  = byAmt.map(r => svcConfig(r.service).dot);

  const service = document.getElementById("serviceFilter").value;
  const n = Math.min(topN, byAmt.length);
  document.getElementById("chartTitle").textContent =
    `Top ${n} Programs${activeYear !== "all" ? " · FY"+activeYear : ""}${service !== "all" ? " · "+service : ""}`;

  if (chart) chart.destroy();
  chart = new Chart(document.getElementById("budgetChart"), {
    type: "bar",
    data: {
      labels,
      datasets: [{ label:"Approved", data:values, backgroundColor:colors, borderRadius:0, borderSkipped:false }]
    },
    options: {
      indexAxis: "y",
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => " " + fmtFull(ctx.parsed.x),
            title: items => byAmt[items[0].dataIndex].program,
          }
        }
      },
      scales: {
        x: {
          grid: { color: "#e8e0c0" },
          ticks: { callback: v => fmt(v), font: { family:"'DM Mono', monospace", size:11 } }
        },
        y: { grid: { display:false }, ticks: { font: { family:"'DM Mono', monospace", size:11 } } }
      }
    }
  });
}

// ── TABLE ──
function renderTable() {
  const tbody  = document.getElementById("tableBody");
  const noData = document.getElementById("noData");
  const start  = currentPage * PAGE_SIZE;
  const page   = filtered.slice(start, start + PAGE_SIZE);

  if (!filtered.length) {
    tbody.innerHTML = "";
    noData.style.display = "block";
  } else {
    noData.style.display = "none";
    tbody.innerHTML = page.map((r, i) => {
      const cfg = svcConfig(r.service);
      return `<tr>
        <td style="color:var(--mid);font-size:0.65rem">${start+i+1}</td>
        <td>${r.program}</td>
        <td><span class="dot" style="background:${cfg.dot}"></span>${r.service}</td>
        <td class="amount-cell">${fmtFull(r.amount)}</td>
      </tr>`;
    }).join("");
  }

  const total = filtered.length;
  const totalPages = Math.ceil(total / PAGE_SIZE);
  document.getElementById("pagerInfo").textContent =
    total ? `${Math.min(start+1,total)}–${Math.min(start+PAGE_SIZE,total)} of ${total.toLocaleString()}` : "";
  document.getElementById("prevBtn").disabled = currentPage === 0;
  document.getElementById("nextBtn").disabled = currentPage >= totalPages - 1;
  document.getElementById("tableTitle").textContent =
    `All Programs${activeYear !== "all" ? " · FY"+activeYear : ""}`;
}

document.querySelectorAll("thead th[data-col]").forEach(th => {
  th.addEventListener("click", () => {
    const col = th.dataset.col;
    if (sortCol === col) sortDir *= -1;
    else { sortCol = col; sortDir = col === "amount" ? -1 : 1; }
    document.querySelectorAll("thead th").forEach(h => h.classList.remove("sorted-asc","sorted-desc"));
    th.classList.add(sortDir === 1 ? "sorted-asc" : "sorted-desc");
    filtered.sort((a,b) => {
      let av = a[sortCol], bv = b[sortCol];
      if (typeof av==="string") av=av.toLowerCase();
      if (typeof bv==="string") bv=bv.toLowerCase();
      return av<bv ? sortDir : av>bv ? -sortDir : 0;
    });
    currentPage = 0;
    renderTable();
  });
});

document.getElementById("prevBtn").addEventListener("click", () => { currentPage--; renderTable(); window.scrollTo(0, document.querySelector(".panel").offsetTop - 20); });
document.getElementById("nextBtn").addEventListener("click", () => { currentPage++; renderTable(); window.scrollTo(0, document.querySelector(".panel").offsetTop - 20); });
["serviceFilter","topN"].forEach(id => document.getElementById(id).addEventListener("change", applyFilters));
document.getElementById("searchBox").addEventListener("input", applyFilters);

applyFilters();
</script>
</body>
</html>
